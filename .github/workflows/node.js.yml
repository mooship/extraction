name: Node.js CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm exec biome check .
      - name: Cache Astro
        uses: actions/cache@v5
        with:
          path: node_modules/.astro
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-astro-${{ hashFiles('pnpm-lock.yaml', 'astro.config.*', 'tsconfig*.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-astro-
      - name: Type check
        run: pnpm check
      - run: pnpm build
      - run: pnpm test
